<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tonny's Pizza </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="https://png.pngtree.com/png-vector/20250426/ourmid/pngtree-cartoon-chef-holding-pizza-with-happy-expression-clipart-illustration-png-image_16108826.png" alt="Logo Pizzaiolo" class="logo-img">
                <span>Tonny's Pizza</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" onclick="showSection('home')">Home</a></li>
                <li><a href="#" onclick="showSection('cardapio')">Cardápio</a></li>
                <li><a href="#" onclick="showSection('clientes')">Clientes</a></li>
                <li><a href="#" onclick="showSection('cadastro')">Cadastrar</a></li>
                <li><a href="#" onclick="showSection('login')">Login</a></li>
                <li id="menuUsuario" style="display:none;">
                    <a href="#" onclick="logout()">Sair</a>
                </li>
            </ul>
        </nav>
    </header>

    <main id="content">
        <!-- Seção Home (Capa) -->
        <section id="home" class="active-section">
            <div class="hero-text">
                <h1>A Melhor Pizza de Canguaretama</h1>
                <p>Sabor autêntico e massa artesanal.</p>
            </div>
        </section>

        <section id="cardapio" style="display:none;">
            <h2>Nosso Cardápio</h2>

        <!-- Categorias -->
            <div class="menu-categorias">
                <button onclick="carregarCategoria('pizzas')">Pizzas</button>
                <button onclick="carregarCategoria('pasteis')">Pastéis</button>
                <button onclick="carregarCategoria('petiscos')">Petiscos</button>
                <button onclick="carregarCategoria('bebidas')">Bebidas</button>
            </div>

            <!-- Conteúdo dinâmico -->
            <div id="conteudo-cardapio" class="cardapio-bg">
                <!-- Conteúdo aparece aqui -->
            </div>
        </section>

        <!-- Seção Clientes -->
        <section id="clientes" style="display:none;">
            <h2>Galeria de Clientes</h2>

            <div class="galeria">
                <img src="img/clientes1.jpg" alt="Cliente 1">
                <img src="img/clientes2.jpg" alt="Cliente 2">
                <img src="img/clientes3.jpeg" alt="Cliente 3">
            </div>
        </section>

        <section id="cadastro" style="display:none;">
            <h2>Cadastre-se</h2>
            <form class="auth-form" id="formCadastro">
                <input type="text" id="cadNome" placeholder="Nome Completo" required minlength="3">
                <input type="email" id="cadEmail" placeholder="E-mail" required>
                <input type="password" id="cadSenha" placeholder="Senha" required minlength="6">
                <input type="password" id="cadConfirmar" placeholder="Confirmar Senha" required minlength="6">
                <button type="submit">Enviar Cadastro</button>
            </form>
    
        </section>

        <!-- Seção Login -->
        <section id="login" style="display:none;">
            <h2>Login</h2>

            <form class="auth-form" id="formLogin">
                <input type="email" id="loginEmail" placeholder="E-mail" required>
                <input type="password" id="loginSenha" placeholder="Senha" required minlength="6">
                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
    
    <footer>
        Praça Augusto Severo, Centro - (yy) x xxxx-xxxx
    </footer>

</body>
</html>
